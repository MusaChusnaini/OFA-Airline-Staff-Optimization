name: Python CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'OFA-Gemini-Client/**' # Sesuaikan dengan nama folder barumu
      - '.github/workflows/python-ci.yaml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'OFA-Gemini-Client/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd OFA-Gemini-Client
        python -m pip install --upgrade pip
        # pip install -r requirements.txt (buka nanti kalau file ini sudah ada)

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 OFA-Gemini-Client/